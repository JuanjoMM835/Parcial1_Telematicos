<VirtualHost *:80>
    ServerName parcial.juanjo.com
    ServerAlias www.parcial.juanjo.com

    DocumentRoot /var/www/parcial

    <Directory /var/www/parcial>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Mejor comportamiento caches / proxies
    Header always append Vary Accept-Encoding

    ErrorLog ${APACHE_LOG_DIR}/parcial_error.log
    CustomLog ${APACHE_LOG_DIR}/parcial_access.log combined
</VirtualHost>
